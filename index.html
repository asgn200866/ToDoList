<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDoList</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top-label">
      <h1>Monthly Planner</h1>
      <div>
        <input type="text" id="monthElement" />
        <span>month:</span>
      </div>
    </header>
    <!-- Панель заголовка и месяца -->
    <main>
      <section class="pretop-label" aria-label="Задачи">
        <div class="task-label">
          <h2>tasks</h2>
          <button
            class="smile-btn"
            data-class="tasksmile"
            aria-label="Выбрать случайный смайлик"
          ></button>
          <button class="button-delete" data-name="task-delete" aria-label="Удалить все задачи">
            ✕
          </button>
        </div>
        <!-- Заголовок панели задач -->
        <div class="nodeadline-label">
          <h2>no deadline</h2>
          <button
            class="smile-btn"
            data-class="nodeadlinesmile"
            aria-label="Выбрать случайный смайлик"
          ></button>
          <button
            class="button-delete"
            data-name="nodeadline-delete"
            aria-label="Удалить все задачи"
          >
            ✕
          </button>
        </div>
        <!-- Заголовок панели задач без крайнего срока -->
      </section>
      <!-- Заголовки колонок задач -->
      <section class="label-text-quests" aria-label="Поля ввода задач">
        <ul class="column-task" id="taskText">
          <!--<li class="label-text-task">
            <input type="checkbox" class="task-cb" />
            <input type="text" class="task-input" />
          </li>-->
        </ul>
        <!-- Блок для колонки задач -->
        <div class="main-photo">
          <img src="galery/mainphoto.jpg" alt="Главное фото" />
        </div>
        <!-- Мемное фото в центре -->
        <ul class="column-nodeadline" id="nodeadlineText">
          <!--<li class="label-text-nodeadline">
            <input type="checkbox" class="nodeadline-cb" />
            <input type="text" class="nodeadline-input" />
          </li>-->
        </ul>
        <!-- Блок для колонки задач без крайнего срока -->
      </section>
      <!-- Колонки задач -->
      <section aria-label="Дни недели">
        <ul class="days-week">
          <li><h3>monday</h3></li>
          <li><h3>tuesday</h3></li>
          <li><h3>wednesday</h3></li>
          <li><h3>thursday</h3></li>
          <li><h3>friday</h3></li>
          <li><h3>saturday</h3></li>
          <li><h3>sunday</h3></li>
        </ul>
      </section>
      <!-- Заголовки дней недели -->
      <section class="label-text-week" aria-label="Поля ввода дней недели">
        <ul class="column-monday" id="mondayText">
          <!--     <li class="label-text-monday">
          <input type="checkbox" class="checkbox-day-week" />
          <input type="text" class="monday-input" />
        </li> -->
        </ul>
        <ul class="column-tuesday" id="tuesdayText">
          <!--       <li class="label-text-tuesday">
          <input type="checkbox" class="checkbox-day-week" />
          <input type="text" class="tuesday-input" />
        </li> -->
        </ul>
        <ul class="column-wednesday" id="wednesdayText">
          <!--         <li class="label-text-wednesday">
          <input type="checkbox" class="checkbox-day-week" />
          <input type="text" class="wednesday-input" />
        </li> -->
        </ul>
        <ul class="column-thursday" id="thursdayText">
          <!--       <li class="label-text-thursday">
          <input type="checkbox" class="checkbox-day-week" />
          <input type="text" class="thursday-input" />
        </li> -->
        </ul>
        <ul class="column-friday" id="fridayText">
          <!--         <li class="label-text-friday">
          <input type="checkbox" class="checkbox-day-week" />
          <input type="text" class="friday-input" />
        </li> -->
        </ul>
        <ul class="column-saturday" id="saturdayText">
          <!--      <li class="label-text-saturday">
          <input type="checkbox" class="checkbox-day-week" />
          <input type="text" class="saturday-input" />
        </li> -->
        </ul>
        <ul class="column-sunday" id="sundayText">
          <!--        <li class="label-text-sunday">
          <input type="checkbox" class="checkbox-day-week" />
          <input type="text" class="sunday-input" />
        </li> -->
        </ul>
      </section>
      <!-- Колонки задач для дней недели -->
    </main>
    <div class="label-delete">
      <h2></h2>
      <img class="image-mem" alt="Мем фото" />
      <div class="buttons-succes">
        <button data-type="button-change" id="yes">Yes</button>
        <button data-type="button-change" id="no">No</button>
      </div>
    </div>
    <!-- Окно удаления -->

    <script src="script.js"></script>
  </body>
</html>
